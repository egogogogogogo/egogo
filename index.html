<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Face Test & Lotto Generator</title>
    <meta name="google-adsense-account" content="ca-pub-7705975032260531">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7705975032260531"
     crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="theme-switch-wrapper">
        <button id="theme-toggle">Dark Mode</button>
    </div>
    <div class="container">
        <section class="animal-test">
            <h1>동물상 테스트</h1>
            <p>나의 얼굴은 강아지상일까, 고양이상일까?</p>
            
            <div id="upload-area" class="upload-area">
                <input type="file" id="image-input" accept="image/*" hidden>
                <button id="upload-btn" class="main-btn">사진 업로드하기</button>
                <div id="image-preview" class="image-preview">
                    <img id="face-image" src="" alt="Face Preview" style="display: none; max-width: 100%; border-radius: 10px;">
                </div>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <p>모델 분석 중...</p>
            </div>

            <div id="result-area" class="result-area" style="display: none;">
                <h2 id="result-title">분석 결과</h2>
                <div id="label-container" class="label-container"></div>
                <button id="retry-btn" class="main-btn" style="margin-top: 20px;">다시 하기</button>
            </div>
        </section>

        <hr class="divider">

        <section class="lotto-generator">
            <h1>Lotto Number Generator</h1>
            <div id="lotto-sets-container" class="lotto-sets-container"></div>
            <button id="generate-btn" class="main-btn">Generate Numbers</button>
        </section>

        <hr class="divider">

        <div class="contact-form">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xlgwkleq" method="POST">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required>
                </div>
                <div class="form-group">
                    <label for="subject">제목</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>

        <hr class="divider">

        <div id="disqus_thread" class="disqus-container"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.

            };

            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-lcmkbytxzs.disqus.com/embed.js';

            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="main.js"></script>
</body>
</html>
